<h1>Me contacter</h1>
<p>Une question, un projet, ou juste envie de parler du web des années 2000 ? Envoyez un message via le formulaire ci-dessous.</p>

<form id="contact-form" novalidate>
    <div class="form-row">
        <label for="nom">Nom <span aria-hidden="true">*</span></label>
        <input type="text" id="nom" name="nom" placeholder="Votre nom" required autocomplete="name">
    </div>
    <div class="form-row">
        <label for="email">Adresse e-mail <span aria-hidden="true">*</span></label>
        <input type="email" id="email" name="email" placeholder="votre@email.com" required autocomplete="email">
    </div>
    <div class="form-row">
        <label for="message">Message <span aria-hidden="true">*</span></label>
        <textarea id="message" name="message" rows="5" placeholder="Votre message…" required></textarea>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn-95">✉ Envoyer le message</button>
        <button type="reset" class="btn-95">✕ Effacer</button>
    </div>
    <p class="form-status" id="form-status" aria-live="polite"></p>
</form>
