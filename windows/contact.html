<h1>Me contacter</h1>
<p>Une question, un projet, ou juste envie de parler du web des années 2000 ? Envoyez un message via le formulaire ci-dessous.</p>

<form id="contact-form">
    <div class="form-row">
        <label for="nom">Nom</label>
        <input type="text" id="nom" name="nom" required>
    </div>
    <div class="form-row">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" name="email" required>
    </div>
    <div class="form-row">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" required></textarea>
    </div>
    <button type="submit" class="btn-95">Envoyer le message</button>
</form>
